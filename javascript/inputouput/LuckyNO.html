<body>
    <script>
        //Math object - Random nor b/tn to 6 

        let luckyno = Math.floor(Math.random()*6) + 1 

        // console.log(luckyno)

        // game Logic 

        while(true){

           guess = prompt('Enter Number Between  to 6')

           if(luckyno == guess){

            alert('You Won!!')
            break;                    // Stop or to break he code - come out of the loop

           }else{
            
            alert('Better Luck next time')
           }


        }


    </script>
